<h2>Products</h2>

<button (click)="newProduct()">New Product</button>

<table>

  <tr>
    <th>ID</th>
    <th>Name</th>
    <th>Price</th>
    <th>Stock</th>
    <th>Actions</th>
  </tr>

  <tr *ngFor="let p of products">

    <td>{{p.productId}}</td>
    <td>{{p.productName}}</td>
    <td>{{p.unitPrice}}</td>
    <td>{{p.stock}}</td>

    <td>
      <button (click)="edit(p.productId!)">Edit</button>
      <button (click)="delete(p.productId!)">Delete</button>
    </td>

  </tr>

</table>
