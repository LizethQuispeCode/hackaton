<div class="login-container">
    <h2>Iniciar Sesión</h2>

    <form #loginForm="ngForm" (ngSubmit)="loginForm.valid && login()" novalidate>
        <label for="usemame">Usuario</label>
        <input
            id="usemame"
            name="usemame"
            type="text"
            placeholder="Usuario"
            [(ngModel)]="usemame"
            required>
        <small class="error" *ngIf="loginForm.submitted && !usemame">
            El usuario es obligatorio.
        </small>

        <label for="password">Contraseña</label>
        <input
            id="password"
            name="password"
            type="password"
            placeholder="Contraseña"
            [(ngModel)]="password"
            required>
        <small class="error" *ngIf="loginForm.submitted && !password">
            La contraseña es obligatoria.
        </small>

        <button type="submit" [disabled]="loginForm.invalid">Ingresar</button>
    </form>
</div>
