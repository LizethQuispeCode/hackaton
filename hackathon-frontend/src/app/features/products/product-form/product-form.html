<h2>Product</h2>

<form #productForm="ngForm" (ngSubmit)="productForm.valid && save()" novalidate>
    <label for="productName">Name</label>
    <input
        id="productName"
        type="text"
        [(ngModel)]="product.productName"
        name="productName"
        #productNameModel="ngModel"
        required>
    <small class="error" *ngIf="productNameModel.invalid && (productNameModel.touched || productForm.submitted)">
        El nombre es obligatorio.
    </small>

    <label for="unitPrice">Price</label>
    <input
        id="unitPrice"
        type="number"
        [(ngModel)]="product.unitPrice"
        name="unitPrice"
        #unitPriceModel="ngModel"
        required
        min="1">
    <small class="error" *ngIf="unitPriceModel.invalid && (unitPriceModel.touched || productForm.submitted)">
        El precio debe ser mayor que 0.
    </small>

    <label for="stock">Stock</label>
    <input
        id="stock"
        type="number"
        [(ngModel)]="product.stock"
        name="stock"
        #stockModel="ngModel"
        required
        min="0">
    <small class="error" *ngIf="stockModel.invalid && (stockModel.touched || productForm.submitted)">
        El stock no puede estar vacío ni ser negativo.
    </small>

    <button type="submit" [disabled]="productForm.invalid">Save</button>
</form>
