<div class="login-container">

    <h2>Iniciar Sesión</h2>

    <input
        type="text"
        placeholder="Usuario"
        [(ngModel)]="usersname">

    <input
        type="password"
        placeholder="Contraseña"
        [(ngModel)]="password">

    <button (click)="login()">
        Ingresar
    </button>

</div>
