<div class="login-container">
    <h2>Iniciar Sesión</h2>

    <form #loginForm="ngForm" (ngSubmit)="loginForm.valid && login()" novalidate>
        <label for="usersname">Usuario</label>
        <input
            id="usersname"
            name="usersname"
            type="text"
            placeholder="Usuario"
            [(ngModel)]="usersname"
            required>
        <small class="error" *ngIf="loginForm.submitted && !usersname">
            El usuario es obligatorio.
        </small>

        <label for="password">Contraseña</label>
        <input
            id="password"
            name="password"
            type="password"
            placeholder="Contraseña"
            [(ngModel)]="password"
            required>
        <small class="error" *ngIf="loginForm.submitted && !password">
            La contraseña es obligatoria.
        </small>

        <button type="submit" [disabled]="loginForm.invalid">Ingresar</button>
    </form>
</div>
